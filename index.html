<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성경 뷰어</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="main-container">
    <div class="sidebar" id="sidebar">
        <button id="sidebar-settings-btn" class="button btn-settings" style="width: 100%; margin-left: 0; margin-bottom: 10px;">⚙️ 설정 열기/닫기</button>
        
        <div id="sidebar-settings-panel" class="hidden">
            <div class="setting-item">
                <label>📚 역본 설정 (최대 4개)</label>
                <div class="dnd-wrapper-vertical">
                    <div class="dnd-column">
                        <h4>선택됨 (드래그)</h4>
                        <ul id="selected-versions-list" class="dnd-list"></ul>
                    </div>
                    <div class="dnd-column">
                        <h4>대기중</h4>
                        <ul id="available-versions-list" class="dnd-list"></ul>
                    </div>
                </div>
            </div>
            
            <div class="setting-item">
                <label>🔍 검색 모드</label>
                <select id="search-mode-dropdown" class="dropdown">
                    <option value="exact">일치 검색 (기본)</option>
                    <option value="and">모든 단어 포함 (AND)</option>
                    <option value="or">아무 단어나 포함 (OR)</option>
                </select>
                <p style="font-size: 12px; color: #777; margin: 4px 0 0 0; line-height: 1.3;">* 한국어 검색은 선택된 역본 중 첫 번째(맨 위) 성경을 기준으로 진행됩니다.</p>
            </div>

            <div class="setting-item">
                <label>📄 출력 양식</label>
                <select id="format-dropdown" class="dropdown">
                    <option value="standard">기본 모드</option>
                    <option value="abbr">약식 모드</option>
                    <option value="sequence">연속 모드</option>
                    <option value="quote">인용 모드</option>
                    <option value="short-quote">인용 약식 모드</option>
                    <option value="double-quote">겹낫표 인용 모드</option>
                    <option value="double-short-quote">겹낫표 약식 모드</option>
                </select>
            </div>
            
            <div class="setting-item">
                <div>
                    <input type="checkbox" id="case-sensitive-checkbox"> 
                    <label for="case-sensitive-checkbox" style="font-weight: normal; cursor: pointer; font-size: 13px;">영문 대소문자 구분</label>
                </div>
            </div>
            
            <div class="setting-item" style="border-bottom: none; margin-bottom: 5px;">
                <label>🔠 글자 크기</label>
                <div class="font-size-controls" style="flex-wrap: wrap;">
                    <button class="button btn-size" data-size="14px">작게</button>
                    <button class="button btn-size active" data-size="16px">기본</button>
                    <button class="button btn-size" data-size="20px">크게</button>
                    <button class="button btn-size" data-size="24px">최대</button>
                </div>
            </div>
        </div>

        <div id="bible-buttons-container"></div>
    </div>
    
    <div class="content-area">
        <div class="search-area">
            <input type="text" id="search-input" placeholder="단어 검색 또는 구절 검색 (예: 창 1:1, 하나님 예수님)">
            <button class="button btn-search" id="search-button">검색</button>
        </div>
        
        <div class="controls-container">
            <div class="navigation-buttons hidden" id="navigation-buttons">
                <button class="button btn-nav" id="prev-chapter">이전 장</button>
                <button class="button btn-nav" id="next-chapter">다음 장</button>
            </div>
        </div>
        
        <div class="output-container" id="output-wrapper">
            <p id="loading-msg" style="padding: 20px;">데이터를 불러오는 중입니다... 잠시만 기다려주세요.</p>
        </div>
    </div>
</div>

<div id="toast-notification" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
